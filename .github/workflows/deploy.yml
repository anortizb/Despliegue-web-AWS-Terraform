name: Terraform Infrastructure Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    
    env:
      AWS_REGION: us-east-1
      BACKEND_BUCKET: andres-ortiz-terraform-state
      TF_VAR_bucket_name: andres-ortiz-web-estatica
      TF_VAR_backend_bucket: andres-ortiz-terraform-state

    steps:
      # ========================================
      # PASO 1: CHECKOUT DEL CÓDIGO
      # ========================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ========================================
      # PASO 2: CONFIGURAR AWS
      # ========================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ========================================
      # PASO 3: BOOTSTRAP DEL BACKEND S3
      # ========================================
      - name: Bootstrap S3 Backend Bucket
        run: |
          echo "================================================"
          echo "BOOTSTRAP DEL BUCKET DE BACKEND DE TERRAFORM"
          echo "================================================"
          
          BUCKET="${{ env.BACKEND_BUCKET }}"
          REGION="${{ env.AWS_REGION }}"
          
          echo "→ Verificando existencia del bucket: $BUCKET"
          
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "✓ El bucket de backend ya existe"
          else
            echo "✗ El bucket no existe. Iniciando creación..."
            
            # Crear bucket
            echo "→ Creando bucket en región $REGION..."
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$REGION"
            
            echo "✓ Bucket creado"
            
            # Habilitar versionado
            echo "→ Habilitando versionado..."
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            
            echo "✓ Versionado habilitado"
            
            # Habilitar cifrado
            echo "→ Configurando cifrado AES-256..."
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration '{
                "Rules": [{
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "AES256"
                  },
                  "BucketKeyEnabled": true
                }]
              }'
            
            echo "✓ Cifrado configurado"
            
            # Bloquear acceso público
            echo "→ Bloqueando acceso público..."
            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
                "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            
            echo "✓ Acceso público bloqueado"
            
            # Agregar tags
            echo "→ Agregando tags..."
            aws s3api put-bucket-tagging \
              --bucket "$BUCKET" \
              --tagging 'TagSet=[
                {Key=Environment,Value=dev},
                {Key=Owner,Value=Andres Ortiz},
                {Key=Project,Value=Betek},
                {Key=ManagedBy,Value=Terraform},
                {Key=Purpose,Value=TerraformBackend}
              ]'
            
            echo "✓ Tags agregados"
            echo ""
            echo "✅ Bucket de backend configurado completamente"
          fi
          
          echo "================================================"

      # ========================================
      # PASO 4: SETUP DE TERRAFORM
      # ========================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      # ========================================
      # PASO 5: INICIALIZACIÓN
      # ========================================
      - name: Terraform Init
        run: |
          echo "Inicializando Terraform..."
          terraform init
          echo "✓ Terraform inicializado"

      # ========================================
      # PASO 6: VALIDACIÓN DE FORMATO
      # ========================================
      - name: Terraform Format Check
        run: |
          echo "Verificando formato del código..."
          terraform fmt -check -recursive || echo "⚠️  Advertencia: código no formateado"
        continue-on-error: true

      # ========================================
      # PASO 7: VALIDACIÓN DE SINTAXIS
      # ========================================
      - name: Terraform Validate
        run: |
          echo "Validando configuración..."
          terraform validate
          echo "✓ Configuración válida"

      # ========================================
      # PASO 8: PLAN DE EJECUCIÓN
      # ========================================
      - name: Terraform Plan
        run: |
          echo "Generando plan de ejecución..."
          terraform plan -out=tfplan -input=false
          echo "✓ Plan generado"

      # ========================================
      # PASO 9: APLICAR CAMBIOS (SOLO EN MAIN)
      # ========================================
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "================================================"
          echo "APLICANDO CAMBIOS EN LA INFRAESTRUCTURA"
          echo "================================================"
          terraform apply -auto-approve -input=false
          echo ""
          echo "✅ Infraestructura desplegada exitosamente"
          echo "================================================"

      # ========================================
      # PASO 10: MOSTRAR OUTPUTS
      # ========================================
      - name: Show Terraform Outputs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo ""
          echo "================================================"
          echo "INFORMACIÓN DEL DESPLIEGUE"
          echo "================================================"
          terraform output -json | jq -r '
            to_entries[] | 
            "  \(.key | ascii_upcase): \(.value.value)"
          '
          echo "================================================"
          echo ""
          echo "🌐 Accede a tu sitio web usando la URL mostrada arriba"
          echo ""